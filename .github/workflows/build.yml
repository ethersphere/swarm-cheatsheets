name: build

on:
  push:
    branches: [main]
    paths: ['src/**', 'assets/**', 'scripts/**', '.github/workflows/**']
  pull_request:
    paths: ['src/**', 'assets/**', 'scripts/**', '.github/workflows/**']
  schedule:
    # Weekly link check — a printed card is only as good as its links.
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  pdf:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify index.html is regenerated from cheatsheet.html
        # index.html is a generated, committed file. If it drifts from its
        # source, fail — the contributor must rerun ./scripts/build-web.sh.
        # Stage first, then diff --cached: this catches a NEW card whose
        # generated index.html was never committed (plain `git diff` ignores
        # untracked files and would pass).
        run: |
          ./scripts/build-web.sh
          git add -A -- 'src/cheatsheets/*/index.html'
          git diff --cached --exit-code -- 'src/cheatsheets/*/index.html' \
            || { echo "::error::index.html is stale or uncommitted — run ./scripts/build-web.sh and commit."; exit 1; }
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: Generate PDFs
        run: CHROME='${{ steps.chrome.outputs.chrome-path }}' ./scripts/pdf.sh
      - uses: actions/upload-artifact@v4
        with:
          name: cheatsheet-pdfs
          path: dist/*.pdf

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check cheatsheet links
        run: ./scripts/check-links.sh
