name: build

on:
  push:
    branches: [main]
    paths: ['src/**', 'assets/**', 'scripts/**', '.github/workflows/**']
  pull_request:
    paths: ['src/**', 'assets/**', 'scripts/**', '.github/workflows/**']
  schedule:
    # Weekly link check — a printed card is only as good as its links.
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  pdf:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: Generate PDFs
        run: CHROME='${{ steps.chrome.outputs.chrome-path }}' ./scripts/pdf.sh
      - uses: actions/upload-artifact@v4
        with:
          name: cheatsheet-pdfs
          path: dist/*.pdf

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check cheatsheet links
        run: ./scripts/check-links.sh
